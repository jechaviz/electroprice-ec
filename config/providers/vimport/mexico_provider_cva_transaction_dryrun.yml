name: mexico_provider_cva_transaction_dryrun
description: No-submit transaction dry-run for Grupo CVA subshopping quote, cart, shipping, and payment-review discovery.
target: https://me2.grupocva.com/me/inicio.php
mode: transaction_dryrun
strategy: credentialed_browser_network_first
schedule: manual
persona: wholesale_purchase_operator
auth:
  type: credentialed_portal
  login_url: https://me2.grupocva.com/me/inicio.php
  username_env: CVA_PORTAL_USER
  password_env: CVA_PORTAL_PASSWORD
  credential_owner: client_user
  actions_allowed: [login, search, product_detail, cart_prepare, cart_quote, shipping_quote, tax_quote, payment_review, capture_network, export_dryrun]
  actions_denied: [order_confirm, payment_submit, card_store, account_change]
transaction:
  dry_run: true
  provider_id: cva
  stop_before: [final_order_submit, payment_authorization, irreversible_inventory_hold]
  cleanup_required: true
  idempotency_key: "{{retail_order_id}}:{{purchase_order_id}}"
  input_schema: [retail_order_id, purchase_order_id, shipping_address, line_items]
  output_schema: [cart_reference, wholesale_subtotal, tax_total, shipping_total, provider_eta, payment_methods, captured_endpoints]
capture:
  - type: fetch
    pattern: /api|/pedido|/carrito|/guia|/existencia
    source: network_api
  - type: websocket
    pattern: .*
    source: network_stream
deliver:
  - type: json
    path: out/mexico_provider_portals/cva_transaction_dryrun.json
policy:
  require_tls: true
  allow_private_networks: false
  max_body_bytes: 10485760
  allowed_hosts: [me2.grupocva.com]
  blocked_hosts: [169.254.169.254]
  submit_enabled: false
