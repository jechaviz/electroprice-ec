name: mexico_provider_ingram_portal
description: Authorized read-only VImport pipeline for Ingram Mexico portal fallback when API scopes are unavailable.
target: https://mx.ingrammicro.com/Site/Login/IdpWidget?ReturnUrl=%2F%2Fmx.ingrammicro.com%2F
mode: network_tap
strategy: credentialed_browser_network_first
schedule: manual
persona: wholesale_price_operator
auth:
  type: credentialed_portal
  login_url: https://mx.ingrammicro.com/Site/Login/IdpWidget?ReturnUrl=%2F%2Fmx.ingrammicro.com%2F
  username_env: INGRAM_PORTAL_USER
  password_env: INGRAM_PORTAL_PASSWORD
  rotation_days: 60
  credential_owner: client_user
  actions_allowed: [login, search, product_detail, capture_network, export_readonly]
  actions_denied: [add_to_cart, order_create, order_confirm, account_change]
capture:
  - type: fetch
    pattern: /api
    source: network_api
  - type: xhr
    pattern: /catalog
    source: network_api
  - type: xhr
    pattern: /price
    source: network_api
schema:
  - field: sku
    type: text
    source: network_api
    path: $.sku
    required: true
    quality: non_empty
  - field: title
    type: text
    source: network_api
    path: $.title
    required: true
    quality: non_empty
  - field: price
    type: money
    source: network_api
    path: $.price
    required: true
    quality: currency
  - field: stock
    type: integer
    source: network_api
    path: $.availability
    required: false
    quality: numeric
  - field: image_url
    type: url
    source: network_api
    path: $.image
    required: false
    quality: url
deliver:
  - type: jsonl
    path: out/mexico_provider_portals/ingram.jsonl
policy:
  require_tls: true
  allow_private_networks: false
  max_body_bytes: 10485760
  allowed_hosts: [mx.ingrammicro.com]
  blocked_hosts: [169.254.169.254]
