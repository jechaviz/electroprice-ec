name: mexico_provider_cva_portal
description: Authorized read-only VImport pipeline for Grupo CVA ME portal fallback when JSON API coverage is insufficient.
target: https://me2.grupocva.com/me/inicio.php
mode: network_tap
strategy: credentialed_browser_network_first
schedule: manual
persona: wholesale_price_operator
auth:
  type: credentialed_portal
  login_url: https://me2.grupocva.com/me/inicio.php
  username_env: CVA_PORTAL_USER
  password_env: CVA_PORTAL_PASSWORD
  rotation_days: 60
  credential_owner: client_user
  actions_allowed: [login, search, product_detail, capture_network, export_readonly]
  actions_denied: [add_to_cart, order_create, order_confirm, account_change]
capture:
  - type: fetch
    pattern: /api
    source: network_api
  - type: xhr
    pattern: /catalogo
    source: network_api
  - type: xhr
    pattern: /existencia
    source: network_api
schema:
  - field: clave
    type: text
    source: network_api
    path: $.clave
    required: true
    quality: non_empty
  - field: title
    type: text
    source: network_api
    path: $.descripcion
    required: true
    quality: non_empty
  - field: price
    type: money
    source: network_api
    path: $.precio
    required: true
    quality: currency
  - field: stock
    type: integer
    source: network_api
    path: $.existencia
    required: false
    quality: numeric
  - field: image_url
    type: url
    source: network_api
    path: $.imagen
    required: false
    quality: url
deliver:
  - type: jsonl
    path: out/mexico_provider_portals/cva.jsonl
policy:
  require_tls: true
  allow_private_networks: false
  max_body_bytes: 10485760
  allowed_hosts: [me2.grupocva.com]
  blocked_hosts: [169.254.169.254]
