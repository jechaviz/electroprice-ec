name: mexico_provider_syscom_portal
description: Authorized read-only VImport pipeline for SYSCOM portal fallback when developer API credentials or scopes are unavailable.
target: https://www.syscom.mx/
mode: network_tap
strategy: credentialed_browser_network_first
schedule: manual
persona: wholesale_price_operator
auth:
  type: credentialed_portal
  login_url: https://www.syscom.mx/
  username_env: SYSCOM_PORTAL_USER
  password_env: SYSCOM_PORTAL_PASSWORD
  rotation_days: 60
  credential_owner: client_user
  actions_allowed: [login, search, product_detail, capture_network, export_readonly]
  actions_denied: [add_to_cart, order_create, order_confirm, account_change]
capture:
  - type: fetch
    pattern: /api
    source: network_api
  - type: xhr
    pattern: /productos
    source: network_api
  - type: xhr
    pattern: /precio
    source: network_api
schema:
  - field: producto_id
    type: text
    source: network_api
    path: $.id
    required: true
    quality: non_empty
  - field: title
    type: text
    source: network_api
    path: $.titulo
    required: true
    quality: non_empty
  - field: price
    type: money
    source: network_api
    path: $.precio
    required: true
    quality: currency
  - field: stock
    type: integer
    source: network_api
    path: $.existencia
    required: false
    quality: numeric
  - field: image_url
    type: url
    source: network_api
    path: $.imagen
    required: false
    quality: url
deliver:
  - type: jsonl
    path: out/mexico_provider_portals/syscom.jsonl
policy:
  require_tls: true
  allow_private_networks: false
  max_body_bytes: 10485760
  allowed_hosts: [www.syscom.mx]
  blocked_hosts: [169.254.169.254]
