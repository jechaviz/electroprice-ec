api_integrator: 1.4.0
info:
  title: CommerceUp Mexico B2B Wholesale API Profile
  version: 1.4.0
  description: Access-gated AIS profile for CommerceUp/SourcingUp B2B wholesale API, real-time stock, ERP integration, price lists, and volume pricing.
  contact: {name: CommerceUp B2B, url: "https://www.sourcingup.com/tienda-online-mayorista-b2b---digitaliza-y-escala-tu-venta-a-empresas"}
  lang: v
runtime: {name: vhub, module: vhub, yaml_module: vyaml, target: pocketbase_companion}
security:
  require_tls: true
  allow_private_networks: true
  allowed_hosts: [www.sourcingup.com, sourcingup.com, 127.0.0.1]
  blocked_hosts: [169.254.169.254]
  max_body_bytes: 10485760
  timeout_ms: 30000
  auth: {schemes: [private_partner_credentials], token_source: onboarding_required}
  authorization: {object_level: required, function_level: required, property_level: required}
  input_validation: {reject_unknown_fields: true, validate_content_type: true, json_schema: true}
  rate_limit: {enabled: true, per_action_per_minute: 30}
  redirects: {allow: false}
  logging: {redact: [authorization, token, api_key]}
  data_flow: {block_untrusted_response_sinks: true, allowed_untrusted_response_sinks: []}
supplier_servers:
  - {id: commerceup_public, protocol: http, url: "https://www.sourcingup.com"}
  - {id: pocketbase_local, protocol: pocketbase, url: "http://127.0.0.1:8090"}
contracts:
  documentation_sources: {b2b_wholesale: "https://www.sourcingup.com/tienda-online-mayorista-b2b---digitaliza-y-escala-tu-venta-a-empresas"}
  api_surface_status: access_gated
  capabilities: [wholesale_catalog, realtime_stock, erp_api, customer_price_lists, branch_prices, volume_prices]
actions:
  commerceup_api_onboarding:
    performs:
      - perform: {action: log.info, data: {message: "CommerceUp B2B exposes a flexible secure API; obtain tenant-specific endpoint contract before HTTP actions."}}
  commerceup_register_provider_profile:
    performs:
      - perform: {action: pocketbase.create, data: {base_url: "http://127.0.0.1:8090", collection: provider_api_registry, body: {provider: commerceup_b2b, country: MX, status: access_gated, capabilities: realtime_stock_price_lists}}}
vars:
  commerceup_api_key: {from: env, name: COMMERCEUP_API_KEY}
constants: {provider: commerceup_b2b, country: MX}
