api_integrator: 1.4.0
info:
  title: Dropi Mexico Dropshipping Provider Profile
  version: 1.4.0
  description: Access-gated AIS profile for Dropi Mexico catalog, supplier, inventory, price, order, and logistics automation.
  contact: {name: Dropi Mexico, url: "https://www.dropi.mx/"}
  lang: v
runtime: {name: vhub, module: vhub, yaml_module: vyaml, target: pocketbase_companion}
security:
  require_tls: true
  allow_private_networks: true
  allowed_hosts: [www.dropi.mx, dropi.mx, api.dropi.mx, 127.0.0.1]
  blocked_hosts: [169.254.169.254]
  max_body_bytes: 10485760
  timeout_ms: 30000
  auth: {schemes: [private_partner_credentials], token_source: onboarding_required}
  authorization: {object_level: required, function_level: required, property_level: required}
  input_validation: {reject_unknown_fields: true, validate_content_type: true, json_schema: true}
  rate_limit: {enabled: true, per_action_per_minute: 30}
  redirects: {allow: false}
  logging: {redact: [authorization, token, api_key]}
  data_flow: {block_untrusted_response_sinks: true, allowed_untrusted_response_sinks: []}
supplier_servers:
  - {id: dropi_public, protocol: http, url: "https://www.dropi.mx"}
  - {id: dropi_api_probe, protocol: http, url: "https://api.dropi.mx"}
  - {id: pocketbase_local, protocol: pocketbase, url: "http://127.0.0.1:8090"}
contracts:
  documentation_sources: {mexico_site: "https://www.dropi.mx/", api_probe: "https://api.dropi.mx/"}
  api_surface_status: access_gated
  capabilities: [catalog, supplier_products, automated_inventory, automated_prices, orders, shipments]
actions:
  dropi_api_onboarding:
    performs:
      - perform: {action: log.info, data: {message: "Dropi Mexico exposes API host and platform automation; require partner docs before enabling endpoint actions."}}
  dropi_register_provider_profile:
    performs:
      - perform: {action: pocketbase.create, data: {base_url: "http://127.0.0.1:8090", collection: provider_api_registry, body: {provider: dropi_mexico, country: MX, status: access_gated, capabilities: catalog_inventory_price_orders}}}
vars:
  dropi_api_key: {from: env, name: DROPI_API_KEY}
constants: {provider: dropi_mexico, country: MX}
