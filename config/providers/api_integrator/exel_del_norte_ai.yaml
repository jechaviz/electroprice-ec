api_integrator: 1.4.0
info:
  title: Exel del Norte Mexico API Provider Profile
  version: 1.4.0
  description: Access-gated AIS profile for Exel del Norte e-commerce/API integration.
  contact: {name: Exel del Norte, url: "https://www.exel.com.mx/QuieroSerDistribuidor/"}
  lang: v

runtime: {name: vhub, module: vhub, yaml_module: vyaml, target: pocketbase_companion}

security:
  require_tls: true
  allow_private_networks: true
  allowed_hosts: [www.exel.com.mx, exel.com.mx, 127.0.0.1]
  blocked_hosts: [169.254.169.254]
  max_body_bytes: 10485760
  timeout_ms: 30000
  auth: {schemes: [private_partner_credentials], token_source: onboarding_required}
  authorization: {object_level: required, function_level: required, property_level: required}
  input_validation: {reject_unknown_fields: true, validate_content_type: true, json_schema: true}
  rate_limit: {enabled: true, per_action_per_minute: 30}
  redirects: {allow: false}
  logging: {redact: [authorization, token, password, api_key]}
  data_flow: {block_untrusted_response_sinks: true, allowed_untrusted_response_sinks: []}

supplier_servers:
  - {id: exel_public, protocol: http, url: "https://www.exel.com.mx"}
  - {id: pocketbase_local, protocol: pocketbase, url: "http://127.0.0.1:8090"}

contracts:
  documentation_sources:
    distributor_page: "https://www.exel.com.mx/QuieroSerDistribuidor/"
    policies: "https://www.exel.com.mx/politicas"
    connector_evidence: "https://ticket.mojomexico.mx/guia-api-exel-del-norte-woocommerce/"
  api_surface_status: access_gated_or_partner_connector
  expected_capabilities: [catalog, promotions, inventory, orders, shipment_status]

actions:
  exel_api_onboarding:
    tags: [onboarding]
    performs:
      - perform: {action: log.info, data: {message: "Exel API is access-gated; obtain partner endpoint contract before enabling HTTP actions."}}
  exel_register_provider_profile:
    tags: [pocketbase]
    performs:
      - perform: {action: pocketbase.create, data: {base_url: "http://127.0.0.1:8090", collection: provider_api_registry, body: {provider: exel_del_norte, country: MX, status: access_gated_or_partner_connector, source: "https://www.exel.com.mx/QuieroSerDistribuidor/"}}}

vars:
  exel_partner_id: {from: env, name: EXEL_PARTNER_ID}
  exel_api_key: {from: env, name: EXEL_API_KEY}

constants: {provider: exel_del_norte, country: MX}
