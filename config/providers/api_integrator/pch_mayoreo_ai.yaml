api_integrator: 1.4.0
info:
  title: PCH Mayoreo Mexico API Provider Profile
  version: 1.4.0
  description: Access-gated AIS profile for PCH Mayoreo API/connector integration.
  contact: {name: PCH Mayoreo, url: "https://www.pchmayoreo.com/"}
  lang: v

runtime: {name: vhub, module: vhub, yaml_module: vyaml, target: pocketbase_companion}

security:
  require_tls: true
  allow_private_networks: true
  allowed_hosts: [www.pchmayoreo.com, pchmayoreo.com, 127.0.0.1]
  blocked_hosts: [169.254.169.254]
  max_body_bytes: 10485760
  timeout_ms: 30000
  auth: {schemes: [private_partner_credentials], token_source: onboarding_required}
  authorization: {object_level: required, function_level: required, property_level: required}
  input_validation: {reject_unknown_fields: true, validate_content_type: true, json_schema: true}
  rate_limit: {enabled: true, per_action_per_minute: 30}
  redirects: {allow: false}
  logging: {redact: [authorization, token, password, api_key]}
  data_flow: {block_untrusted_response_sinks: true, allowed_untrusted_response_sinks: []}

supplier_servers:
  - {id: pch_public, protocol: http, url: "https://www.pchmayoreo.com"}
  - {id: pocketbase_local, protocol: pocketbase, url: "http://127.0.0.1:8090"}

contracts:
  documentation_sources:
    public_site: "https://www.pchmayoreo.com/"
    connector_evidence: "https://cva.mojomexico.net/product-category/api-mayoristas-erp/"
    integration_reference: "https://www.workana.com/es/job/integracion-api-y-o-webservice-de-ecommerce-a-woocomerce"
  api_surface_status: access_gated_or_partner_connector
  expected_capabilities: [catalog, stock, prices, orders]

actions:
  pch_api_onboarding:
    tags: [onboarding]
    performs:
      - perform: {action: log.info, data: {message: "PCH Mayoreo API is access-gated; obtain official endpoint contract before enabling HTTP actions."}}
  pch_register_provider_profile:
    tags: [pocketbase]
    performs:
      - perform: {action: pocketbase.create, data: {base_url: "http://127.0.0.1:8090", collection: provider_api_registry, body: {provider: pch_mayoreo, country: MX, status: access_gated_or_partner_connector, source: "https://www.pchmayoreo.com/"}}}

vars:
  pch_partner_id: {from: env, name: PCH_PARTNER_ID}
  pch_api_key: {from: env, name: PCH_API_KEY}

constants: {provider: pch_mayoreo, country: MX}
