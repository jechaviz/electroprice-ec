api_integrator: 1.4.0
info:
  title: Grupo Comercial Vexa Mexico Wholesale API Profile
  version: 1.4.0
  description: Access-gated AIS profile for Grupo Comercial Vexa wholesale distribution, inventory, supplier orchestration, and API integrations.
  contact: {name: Grupo Comercial Vexa, url: "https://gcvexa.com/"}
  lang: v
runtime: {name: vhub, module: vhub, yaml_module: vyaml, target: pocketbase_companion}
security:
  require_tls: true
  allow_private_networks: true
  allowed_hosts: [gcvexa.com, 127.0.0.1]
  blocked_hosts: [169.254.169.254]
  max_body_bytes: 10485760
  timeout_ms: 30000
  auth: {schemes: [private_partner_credentials], token_source: onboarding_required}
  authorization: {object_level: required, function_level: required, property_level: required}
  input_validation: {reject_unknown_fields: true, validate_content_type: true, json_schema: true}
  rate_limit: {enabled: true, per_action_per_minute: 30}
  redirects: {allow: false}
  logging: {redact: [authorization, token, api_key]}
  data_flow: {block_untrusted_response_sinks: true, allowed_untrusted_response_sinks: []}
supplier_servers:
  - {id: gcvexa_public, protocol: http, url: "https://gcvexa.com"}
  - {id: pocketbase_local, protocol: pocketbase, url: "http://127.0.0.1:8090"}
contracts:
  documentation_sources: {public_site: "https://gcvexa.com/"}
  api_surface_status: access_gated
  capabilities: [wholesale_distribution, inventory_control, supplier_selection, api_integrations, analytics]
actions:
  gcvexa_api_onboarding:
    performs:
      - perform: {action: log.info, data: {message: "Vexa mentions wholesale distribution and API integrations; obtain private catalog endpoint contract before execution."}}
  gcvexa_register_provider_profile:
    performs:
      - perform: {action: pocketbase.create, data: {base_url: "http://127.0.0.1:8090", collection: provider_api_registry, body: {provider: gcvexa, country: MX, status: access_gated, capabilities: wholesale_distribution_api_integrations}}}
vars:
  gcvexa_api_key: {from: env, name: GCVEXA_API_KEY}
constants: {provider: gcvexa, country: MX}
