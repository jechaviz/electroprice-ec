api_integrator: 1.5.0
info:
  title: Mexico Realtime Price Scheduler
  version: 1.5.0
  description: VHub cronjob orchestration for visible-product price refresh, product enrichment queues, and PocketBase watchlists.
  contact: {name: AIS/VHub, url: "https://github.com/vlang/v"}
  lang: v

runtime: {name: vhub, module: vhub, yaml_module: vyaml, target: pocketbase_companion}

security:
  require_tls: true
  allow_private_networks: true
  allowed_hosts: [127.0.0.1]
  blocked_hosts: [169.254.169.254]
  max_body_bytes: 10485760
  timeout_ms: 30000
  auth: {schemes: [pocketbase_service_token], token_source: env_pb_service_token}
  authorization: {object_level: required, function_level: required, property_level: required}
  input_validation: {reject_unknown_fields: true, validate_content_type: true, json_schema: true}
  rate_limit: {enabled: true, per_action_per_minute: 120}
  redirects: {allow: false}
  logging: {redact: [authorization, token, cookie, set-cookie]}
  data_flow: {block_untrusted_response_sinks: true, allowed_untrusted_response_sinks: []}

supplier_servers:
  - {id: pocketbase_local, protocol: pocketbase, url: "http://127.0.0.1:8090"}

contracts:
  pocketbase_collections:
    product_price_watchlist: [provider, sku, user_id, session_id, last_viewed_at, offer_expires_at, priority, context]
    provider_refresh_queue: [provider, sku, refresh_type, priority, status, attempts, not_before, payload]
    provider_offers: [provider, sku, price, stock, currency, warehouse, expires_at, raw_payload]
  scheduling_policy:
    visible_price_ttl_seconds: 30
    active_view_window_seconds: 900
    stale_content_ttl_hours: 24
    rule: VHub cronjobs enqueue stale work; provider-specific AIS actions perform the actual supplier calls.

cronjobs:
  queue_visible_price_refresh:
    action: queue_visible_price_refresh
    every_seconds: 30
    run_on_start: true
    max_runtime_ms: 25000
  queue_stale_content_refresh:
    action: queue_stale_content_refresh
    every_seconds: 3600
    run_on_start: false
    max_runtime_ms: 45000

actions:
  mark_product_viewed:
    tags: [pocketbase, realtime_price, storefront]
    description: Store the product a user is viewing so VHub cronjobs can refresh stale offers.
    performs:
      - perform:
          action: pocketbase.create
          data:
            base_url: "http://127.0.0.1:8090"
            collection: product_price_watchlist
            headers: {Authorization: "Bearer {{pb_service_token}}"}
            body:
              provider: "{{provider}}"
              sku: "{{sku}}"
              user_id: "{{user_id}}"
              session_id: "{{session_id}}"
              last_viewed_at: "{{now_iso}}"
              offer_expires_at: "{{offer_expires_at}}"
              priority: visible
              context: "{{view_context}}"
  queue_visible_price_refresh:
    tags: [cronjob, realtime_price, pocketbase]
    description: Find visible products whose offer cache is stale and enqueue supplier refresh work.
    performs:
      - perform:
          action: pocketbase.list
          data:
            base_url: "http://127.0.0.1:8090"
            collection: product_price_watchlist
            headers: {Authorization: "Bearer {{pb_service_token}}"}
            query:
              filter: "last_viewed_at >= '{{active_view_window_start}}' && (offer_expires_at = '' || offer_expires_at <= '{{now_iso}}')"
              sort: -last_viewed_at
              perPage: "100"
        responses:
          - is_success: {code: 200}
            performs:
              - perform:
                  action: pocketbase.create
                  data:
                    base_url: "http://127.0.0.1:8090"
                    collection: provider_refresh_queue
                    headers: {Authorization: "Bearer {{pb_service_token}}"}
                    body:
                      refresh_type: visible_price_watchlist
                      status: pending
                      priority: high
                      not_before: "{{now_iso}}"
                      payload: "{{response.body}}"
  queue_stale_content_refresh:
    tags: [cronjob, content, media, pocketbase]
    description: Queue product content/media refreshes when descriptions, attributes, variants, or images are stale.
    performs:
      - perform:
          action: pocketbase.list
          data:
            base_url: "http://127.0.0.1:8090"
            collection: provider_product_content
            headers: {Authorization: "Bearer {{pb_service_token}}"}
            query:
              filter: "updated <= '{{content_stale_before}}'"
              sort: updated
              perPage: "100"
        responses:
          - is_success: {code: 200}
            performs:
              - perform:
                  action: pocketbase.create
                  data:
                    base_url: "http://127.0.0.1:8090"
                    collection: provider_refresh_queue
                    headers: {Authorization: "Bearer {{pb_service_token}}"}
                    body:
                      refresh_type: product_content_media
                      status: pending
                      priority: normal
                      not_before: "{{now_iso}}"
                      payload: "{{response.body}}"

vars:
  pb_service_token: {from: env, name: PB_SERVICE_TOKEN}
  provider: ""
  sku: ""
  user_id: ""
  session_id: ""
  now_iso: ""
  active_view_window_start: ""
  offer_expires_at: ""
  content_stale_before: ""
  view_context: "{}"

constants: {country: MX, scheduler: vhub}
