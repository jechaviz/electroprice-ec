api_integrator: 1.4.0
info:
  title: TVC en Linea Mexico API Provider Profile
  version: 1.4.0
  description: Access-gated AIS profile for TVC en Linea, a Mexico security electronics wholesaler with public API connector evidence.
  contact: {name: TVC en Linea, url: "https://tvc.mx/distributor-benefits"}
  lang: v

runtime: {name: vhub, module: vhub, yaml_module: vyaml, target: pocketbase_companion}

security:
  require_tls: true
  allow_private_networks: true
  allowed_hosts: [tvc.mx, info.tvc.mx, syncvendor.com, 127.0.0.1]
  blocked_hosts: [169.254.169.254]
  max_body_bytes: 10485760
  timeout_ms: 30000
  auth: {schemes: [private_partner_credentials], token_source: onboarding_required}
  authorization: {object_level: required, function_level: required, property_level: required}
  input_validation: {reject_unknown_fields: true, validate_content_type: true, json_schema: true}
  rate_limit: {enabled: true, per_action_per_minute: 30}
  redirects: {allow: false}
  logging: {redact: [authorization, token, password, api_key]}
  data_flow: {block_untrusted_response_sinks: true, allowed_untrusted_response_sinks: []}

supplier_servers:
  - {id: tvc_public, protocol: http, url: "https://tvc.mx"}
  - {id: pocketbase_local, protocol: pocketbase, url: "http://127.0.0.1:8090"}

contracts:
  documentation_sources:
    distributor_benefits: "https://tvc.mx/distributor-benefits"
    connector_evidence: "https://syncvendor.com/"
    connector_guide: "https://ticket.mojomexico.mx/guia-api-tvc-woocommerce/"
  api_surface_status: access_gated_or_partner_connector
  expected_capabilities: [catalog, stock, prices, orders]

actions:
  tvc_api_onboarding:
    tags: [onboarding]
    performs:
      - perform: {action: log.info, data: {message: "TVC API is treated as access-gated until partner credentials and official endpoint contract are supplied."}}
  tvc_register_provider_profile:
    tags: [pocketbase]
    performs:
      - perform: {action: pocketbase.create, data: {base_url: "http://127.0.0.1:8090", collection: provider_api_registry, body: {provider: tvc_enlinea, country: MX, status: access_gated_or_partner_connector, source: "https://syncvendor.com/"}}}

vars:
  tvc_partner_id: {from: env, name: TVC_PARTNER_ID}
  tvc_api_key: {from: env, name: TVC_API_KEY}

constants: {provider: tvc_enlinea, country: MX}
