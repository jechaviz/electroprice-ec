api_integrator: 1.4.0
info:
  title: MBA3 Wholesale Distribution API Profile
  version: 1.4.0
  description: Access-gated AIS profile for MBA3 Wholesale and Distribution API for catalogs, prices, promotions, photographs, descriptions, characteristics, and technical sheets.
  contact: {name: MBA3 Wholesale, url: "https://www.mba3.com/soluciones-retail-wholesale/mba3-wholesale-and-distribution"}
  lang: v
runtime: {name: vhub, module: vhub, yaml_module: vyaml, target: pocketbase_companion}
security:
  require_tls: true
  allow_private_networks: true
  allowed_hosts: [www.mba3.com, mba3.com, 127.0.0.1]
  blocked_hosts: [169.254.169.254]
  max_body_bytes: 10485760
  timeout_ms: 30000
  auth: {schemes: [private_partner_credentials], token_source: onboarding_required}
  authorization: {object_level: required, function_level: required, property_level: required}
  input_validation: {reject_unknown_fields: true, validate_content_type: true, json_schema: true}
  rate_limit: {enabled: true, per_action_per_minute: 30}
  redirects: {allow: false}
  logging: {redact: [authorization, token, api_key]}
  data_flow: {block_untrusted_response_sinks: true, allowed_untrusted_response_sinks: []}
supplier_servers:
  - {id: mba3_public, protocol: http, url: "https://www.mba3.com"}
  - {id: pocketbase_local, protocol: pocketbase, url: "http://127.0.0.1:8090"}
contracts:
  documentation_sources: {wholesale_distribution: "https://www.mba3.com/soluciones-retail-wholesale/mba3-wholesale-and-distribution"}
  api_surface_status: access_gated
  capabilities: [catalog_realtime, prices, promotions, photographs, descriptions, characteristics, technical_sheets, orders]
actions:
  mba3_api_onboarding:
    performs:
      - perform: {action: log.info, data: {message: "MBA3 API is tenant-specific; configure endpoint contract before HTTP actions."}}
  mba3_register_provider_profile:
    performs:
      - perform: {action: pocketbase.create, data: {base_url: "http://127.0.0.1:8090", collection: provider_api_registry, body: {provider: mba3_wholesale, country: MX, status: access_gated, capabilities: product_media_specs_realtime_price}}}
vars:
  mba3_api_key: {from: env, name: MBA3_API_KEY}
constants: {provider: mba3_wholesale, country: MX}
