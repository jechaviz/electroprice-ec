api_integrator: 1.4.0
info:
  title: WIUM Mexico Wholesale Catalog API Profile
  version: 1.4.0
  description: Access-gated AIS profile for WIUM/B2Bee Mexico wholesale catalog API and MercadoLibre inventory sync.
  contact: {name: WIUM, url: "https://b2bee.mx/"}
  lang: v
runtime: {name: vhub, module: vhub, yaml_module: vyaml, target: pocketbase_companion}
security:
  require_tls: true
  allow_private_networks: true
  allowed_hosts: [b2bee.mx, wium.mx, 127.0.0.1]
  blocked_hosts: [169.254.169.254]
  max_body_bytes: 10485760
  timeout_ms: 30000
  auth: {schemes: [private_partner_credentials], token_source: onboarding_required}
  authorization: {object_level: required, function_level: required, property_level: required}
  input_validation: {reject_unknown_fields: true, validate_content_type: true, json_schema: true}
  rate_limit: {enabled: true, per_action_per_minute: 30}
  redirects: {allow: false}
  logging: {redact: [authorization, token, api_key]}
  data_flow: {block_untrusted_response_sinks: true, allowed_untrusted_response_sinks: []}
supplier_servers:
  - {id: wium_public, protocol: http, url: "https://b2bee.mx"}
  - {id: pocketbase_local, protocol: pocketbase, url: "http://127.0.0.1:8090"}
contracts:
  documentation_sources: {public_site: "https://b2bee.mx/"}
  api_surface_status: access_gated
  capabilities: [wholesale_catalog, product_import, marketplace_inventory_sync, api_integrations]
actions:
  wium_api_onboarding:
    performs:
      - perform: {action: log.info, data: {message: "WIUM enterprise plan exposes API for integrations; obtain tenant API docs before HTTP actions."}}
  wium_register_provider_profile:
    performs:
      - perform: {action: pocketbase.create, data: {base_url: "http://127.0.0.1:8090", collection: provider_api_registry, body: {provider: wium_mayoristas, country: MX, status: access_gated, capabilities: wholesale_catalog_api}}}
vars:
  wium_api_key: {from: env, name: WIUM_API_KEY}
constants: {provider: wium_mayoristas, country: MX}
